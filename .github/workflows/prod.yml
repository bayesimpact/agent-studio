on:
  push:
    branches:
      - main
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare against pre-push state

      - name: Check for API changes
        id: check
        run: |
          # Compare against the commit before the push (handles multiple commits)
          BASE_REF="${{ github.event.before }}"
          # Fallback to HEAD^1 if before is not available (e.g., first push)
          if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_REF" ]; then
            BASE_REF="HEAD^1"
          fi

          if make check-api-changes BASE_REF=$BASE_REF; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
            make notify-skip
          fi

  tests:
    needs: [check-changes]
    if: needs.check-changes.outputs.deploy == 'true'
    runs-on:
      labels: ubuntu-latest-m
    environment: test
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

#      - name: Run tests and checks
#        run: make ci

      - name: Run tests
        run: make tests

#      - name: Publish Test Report
#        uses: ctrf-io/github-test-reporter@v1
#        with:
#          report-path: '**/ctrf/*.json'
#          github-report: true

      - name: Notify on failure
        if: ${{ failure() }}
        run: make notify-error

  build-and-push:
    needs: [check-changes]
    if: needs.check-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: gcloud caching
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/gcloud
          key: ${{ runner.os }}-gcloud-beta-v545.0.0

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: beta
          version: "545.0.0"

      - name: Docker connect to GCP
        run: gcloud auth configure-docker REGION-docker.pkg.dev

      - name: Extract image refs
        id: image-refs
        run: make docker-image-refs

      - name: 'Check docker image starts and push it'
        run: make docker-push

      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ steps.image-refs.outputs.api-image-ref }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-api-results.txt'

      - name: Run Trivy vulnerability scanner on Workers
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: '${{ steps.image-refs.outputs.workers-image-ref }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-workers-results.txt'

      - name: Trivy scan summary
        run: |
          echo "## Trivy Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "### API Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-api-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Workers Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat trivy-workers-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: ${{ failure() }}
        run: make notify-error

  deploy:
    needs: [check-changes, tests, build-and-push]
    if: needs.check-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: gcloud caching
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/gcloud
          key: ${{ runner.os }}-beta-gcloud-v545.0.0

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: beta
          version: "545.0.0"

      - id: Secrets
        uses: 'google-github-actions/get-secretmanager-secrets@v2'
        with:
          secrets: |-
            DATABASE_PASSWORD:caseai-connect/CONNECT_DATABASE_PASSWORD

      - name: 'create cred file for cloudsql proxy'
        run: 'mkdir -p dontsave && printf "%s" "$GCP_CREDENTIALS_JSON" > dontsave/key.json && chmod o+r dontsave/key.json'
        shell: bash
        env:
          GCP_CREDENTIALS_JSON: ${{secrets.GCP_CREDENTIALS}}

      - name: migration
        run: make migrations MIG_DATABASE_PASSWORD=${{ steps.Secrets.outputs.DATABASE_PASSWORD }} REGION=eu
        env:
          CLOUDSQL_CREDENTIALS_FILE: ${{ github.workspace }}/dontsave/key.json

      - name: API deploy
        run: make deploy-only REGION=eu

      - name: Workers deploy
        run: make deploy-workers-only REGION=eu

      - name: Notify on failure
        if: ${{ failure() }}
        run: make notify-error

  notify:
    needs: [check-changes, deploy]
    if: needs.check-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: notify
        run: make notify