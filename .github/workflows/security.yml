name: Security

on:
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  trivy:
    name: trivy
    runs-on:
      labels: ubuntu-latest-m
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build images
        run: make docker-build

      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'caseai-connect/api:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          pkg-types: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
          output: 'trivy-api-results.txt'

      - name: Run Trivy vulnerability scanner on Workers
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'caseai-connect/workers:local'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          pkg-types: 'os,library'
          severity: 'CRITICAL,HIGH'
          trivyignores: '.trivyignore.yaml'
          output: 'trivy-workers-results.txt'

      - name: Trivy scan summary
        if: always()
        run: |
          MAX_SIZE=400000
          print_report() {
            local label="$1" file="$2"
            echo "### $label"
            echo '```'
            if [ ! -f "$file" ]; then
              echo "(scan did not run)"
            elif [ "$(wc -c < "$file")" -gt "$MAX_SIZE" ]; then
              echo "... output truncated (showing last ${MAX_SIZE} bytes)"
              echo ""
              tail -c $MAX_SIZE "$file"
            else
              cat "$file"
            fi
            echo '```'
          }
          {
            echo "## Trivy Vulnerability Scan Results"
            print_report "API Image" trivy-api-results.txt
            print_report "Workers Image" trivy-workers-results.txt
          } >> $GITHUB_STEP_SUMMARY
